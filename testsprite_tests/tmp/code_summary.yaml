version: "2"
type: frontend
tech_stack:
  - React 19
  - Vite 7
  - TailwindCSS 4
  - React Router DOM 7
  - Clerk (authentication)
  - Axios
  - Express.js (backend on port 5000)
routes:
  - path: /
    file: src/pages/Home.jsx
    auth_required: false
    description: Landing page with hero section, feature highlights, and call-to-action to start downloading
  - path: /url
    file: src/pages/UrlPage.jsx
    auth_required: false
    description: Main URL downloader page with a two-step form to paste a URL, preview media, and download
  - path: /download
    file: src/pages/DownloadPage.jsx
    auth_required: false
    description: Alternate direct download entry point, also uses the UrlInputForm component
  - path: /saved
    file: src/pages/SavedPage.jsx
    auth_required: true
    description: Saved history page showing all previously downloaded URLs, requires Clerk sign-in
features:
  - name: Home Landing Page
    description: Hero section welcoming users to Saver-UR with feature highlights (Universal URLs, Fast Downloads, Safe & Secure) and CTA buttons
    files:
      - src/pages/Home.jsx
    entry_route: /
    user_interactions:
      - View hero section with headline and live badge
      - Click "Start Downloading" button to navigate to /url
      - View feature highlights section (Universal URLs, Lightning Fast, Safe & Secure)
      - Click "Try it out" button at the bottom CTA section
    api_calls: []
    auth_required: false
  - name: URL Paste and Metadata Fetch
    description: Step 1 of the downloader - user pastes a URL and the app fetches metadata (title, thumbnail, formats) from the backend
    files:
      - src/pages/UrlPage.jsx
      - src/components/UrlInputForm.jsx
      - src/utils/api.js
    entry_route: /url
    user_interactions:
      - Paste a URL into the input field
      - Click "Next Step" button to submit
      - See loading spinner while fetching metadata
      - See error message if URL is invalid or backend unreachable
      - Proceed to step 2 on success
    api_calls:
      - method: GET
        endpoint: /api/preview?url=<url>
    auth_required: false
  - name: Media Download Configuration and Download
    description: Step 2 of the downloader - user configures file name, media type or quality format, previews content, and triggers download
    files:
      - src/components/UrlInputForm.jsx
      - src/components/MediaPreview.jsx
      - src/utils/api.js
      - src/utils/storage.js
    entry_route: /url
    user_interactions:
      - View current URL in summary bar with option to change it
      - Edit the file name in the File Name input
      - Select media type (Image or Video) for generic URLs
      - Select download quality from a dropdown for YouTube/social URLs
      - View media preview or YouTube thumbnail/metadata
      - Click "Download Media" button to start download
      - See success message after download triggers
      - Item saved to localStorage history automatically
    api_calls:
      - method: GET
        endpoint: /api/download?url=<url>&name=<name>&type=<type>&formatId=<formatId>
    auth_required: false
  - name: Saved History
    description: Authenticated users can view, re-download, and delete previously downloaded media entries stored in localStorage
    files:
      - src/pages/SavedPage.jsx
      - src/components/SavedCard.jsx
      - src/utils/storage.js
    entry_route: /saved
    user_interactions:
      - View list of all saved download history cards
      - Click download icon on a saved card to re-trigger download
      - Click delete icon on a saved card to remove it from history
      - Click "Clear All" button to remove all saved history
      - Confirm clear all in browser dialog
      - View storage usage indicator in KB
      - See storage warning when usage exceeds 4MB
      - See empty state message if no saved items
    api_calls:
      - method: GET
        endpoint: /api/download?url=<url>&name=<name>&type=<type>
    auth_required: true
  - name: Clerk Authentication
    description: Users can sign in or sign out via Clerk modal. The /saved route is protected and shows a sign-in prompt for unauthenticated users
    files:
      - src/App.jsx
      - src/components/Navbar.jsx
      - src/main.jsx
    entry_route: /saved
    user_interactions:
      - Click "Sign In" button in the Navbar to open Clerk modal
      - Sign in with Clerk credentials
      - See user avatar (UserButton) in Navbar when signed in
      - Click user avatar to sign out
      - Navigate to /saved while signed out and see "Content Protected" message
    api_calls: []
    auth_required: false
  - name: Navbar Navigation
    description: Fixed top navbar with Saver-UR branding, nav links, and Clerk auth button/profile
    files:
      - src/components/Navbar.jsx
    entry_route: /
    user_interactions:
      - Click Saver-UR logo to go to home
      - Click "Home", "URL Downloader", "Download Entry", "Saved History" nav links
      - Click hamburger menu on mobile to toggle mobile nav
      - Click nav links in mobile menu to navigate
    api_calls: []
    auth_required: false
known_limitations:
  - issue: The /saved page requires Clerk login; unauthenticated users only see a "Content Protected" message with no redirect or sign-in button directly on the page
    location: src/App.jsx
    impact: Users unaware of Clerk must use Navbar sign-in button
  - issue: Download is triggered by creating a hidden anchor element pointing to the backend API; if the backend is not running on port 5000, downloads will silently fail
    location: src/utils/api.js
    impact: No graceful degradation if backend is down
  - issue: Saved history is stored in localStorage only, not synced to a remote database per user account
    location: src/utils/storage.js
    impact: History is not portable across devices or browsers
